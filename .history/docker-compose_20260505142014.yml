version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: streamline-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-streamline}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-adekolze_6427}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamline-network

  # Backend API (.NET)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: streamline-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${DB_NAME:-streamline};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-adekolze_6427};
      - Jwt__Key=${JWT_KEY:-your-super-secret-key-that-is-at-least-32-characters-long-for-hs256}
      - Jwt__Issuer=${JWT_ISSUER:-StreamingPlatform}
      - Jwt__Audience=${JWT_AUDIENCE:-StreamingPlatformUsers}
      - Jwt__ExpiryMinutes=${JWT_EXPIRY_MINUTES:-60}
    ports:
      - "5000:5000"
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - streamline-network
    restart: unless-stopped

  # Frontend React/Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: streamline-frontend
    environment:
      - VITE_API_URL=http://backend:5000
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - streamline-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: streamline-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - streamline-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  streamline-network:
    driver: bridge
